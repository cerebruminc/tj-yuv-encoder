name: Unit test

on:
  push:
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libturbojpeg0-dev pkg-config
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
